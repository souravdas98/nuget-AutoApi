name: CI

on:
  push:
    branches: ["main", "develop", "feature/**", "fix/**", "hotfix/**"]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "LICENSE"
      - "docs/**"
  pull_request:
    branches: ["main", "develop"]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "LICENSE"
      - "docs/**"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  SOLUTION_PATH: "AutoApi.sln"
  PROJECT_PATH: "AutoApi/AutoApi.csproj"
  ARTIFACTS_DIR: "./artifacts"
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 - Lint: fast static checks before anything expensive runs
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Check formatting
        run: |
          dotnet format ${{ env.SOLUTION_PATH }} \
            --verify-no-changes \
            --no-restore

  # ---------------------------------------------------------------------------
  # JOB 2 - Build: compile on all supported runtimes
  # ---------------------------------------------------------------------------
  build:
    name: Build (.NET ${{ matrix.dotnet }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        dotnet: ["8.0.x", "9.0.x", "10.0.x"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-${{ matrix.dotnet }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-${{ matrix.dotnet }}-
            nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build (Release, zero warnings)
        run: |
          dotnet build ${{ env.SOLUTION_PATH }} \
            --no-restore \
            --configuration Release \
            /p:TreatWarningsAsErrors=true \
            /p:WarningLevel=5 \
            /p:ContinuousIntegrationBuild=true

      - name: Verify NuGet pack (dry run)
        run: |
          dotnet pack ${{ env.PROJECT_PATH }} \
            --no-build \
            --configuration Release \
            --output ${{ env.ARTIFACTS_DIR }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-review-${{ github.run_number }}
          path: ${{ env.ARTIFACTS_DIR }}
          retention-days: 7

  # ---------------------------------------------------------------------------
  # JOB 3 - Security: dependency vulnerability scan
  # ---------------------------------------------------------------------------
  security:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Scan for vulnerable packages
        run: |
          dotnet list ${{ env.SOLUTION_PATH }} package --vulnerable --include-transitive 2>&1 | tee vuln-report.txt
          if grep -q "has the following vulnerable packages" vuln-report.txt; then
            echo "::error::Vulnerable packages detected. See vuln-report.txt for details."
            exit 1
          fi
          echo "No vulnerable packages found."

  # ---------------------------------------------------------------------------
  # JOB 4 - CI Passed: single synthetic gate for branch protection rules
  # ---------------------------------------------------------------------------
  ci-passed:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [build, security]
    if: always()

    steps:
      - name: Check all required jobs passed
        run: |
          BUILD="${{ needs.build.result }}"
          SECURITY="${{ needs.security.result }}"

          echo "build    -> $BUILD"
          echo "security -> $SECURITY"

          if [[ "$BUILD" != "success" || "$SECURITY" != "success" ]]; then
            echo "::error::One or more required CI jobs failed."
            exit 1
          fi
          echo "All required CI jobs passed."
