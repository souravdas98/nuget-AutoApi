name: Release to NuGet

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

  workflow_dispatch:
    inputs:
      version:
        description: "Package version e.g. 1.2.3 or 1.2.3-beta.1"
        required: true
        type: string
      dry_run:
        description: "Dry run - build & pack but do NOT push to NuGet"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  SOLUTION_PATH: "AutoApi.sln"
  PROJECT_PATH: "AutoApi/AutoApi.csproj"
  OUTPUT_DIR: "./artifacts"
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 - Validate: resolve & enforce strict semver
  # ---------------------------------------------------------------------------
  validate:
    name: Validate version
    runs-on: ubuntu-latest

    outputs:
      version:    ${{ steps.ver.outputs.VERSION }}
      prerelease: ${{ steps.ver.outputs.PRERELEASE }}
      dry_run:    ${{ steps.ver.outputs.DRY_RUN }}

    steps:
      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            DRY_RUN="${{ github.event.inputs.dry_run }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
            DRY_RUN="false"
          fi

          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([0-9\.\-]+)?$ ]]; then
            echo "::error::Invalid version '$VERSION'. Must be semver e.g. 1.2.3 or 1.2.3-beta.1"
            exit 1
          fi

          if [[ "$VERSION" =~ - ]]; then
            PRERELEASE="true"
          else
            PRERELEASE="false"
          fi

          echo "VERSION=$VERSION"       >> "$GITHUB_OUTPUT"
          echo "PRERELEASE=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "DRY_RUN=$DRY_RUN"      >> "$GITHUB_OUTPUT"

          echo "Version     : $VERSION"
          echo "Pre-release : $PRERELEASE"
          echo "Dry run     : $DRY_RUN"

  # ---------------------------------------------------------------------------
  # JOB 2 - Security: block release if vulnerable packages are found
  # ---------------------------------------------------------------------------
  security:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Scan for vulnerable packages
        run: |
          dotnet list ${{ env.SOLUTION_PATH }} package --vulnerable --include-transitive 2>&1 | tee vuln-report.txt
          if grep -q "has the following vulnerable packages" vuln-report.txt; then
            echo "::error::Vulnerable packages detected. See vuln-report.txt for details."
            exit 1
          fi
          echo "No vulnerable packages found."

  # ---------------------------------------------------------------------------
  # JOB 3 - Build: compile & test
  # ---------------------------------------------------------------------------
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: [validate, security]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ${{ env.NUGET_PACKAGES }}
          key: nuget-${{ runner.os }}-release-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            nuget-${{ runner.os }}-release-

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: |
          dotnet build ${{ env.SOLUTION_PATH }} \
            --no-restore \
            --configuration Release \
            /p:Version=${{ needs.validate.outputs.version }} \
            /p:TreatWarningsAsErrors=true \
            /p:ContinuousIntegrationBuild=true

      # - name: Test
      #   run: |
      #     dotnet test ${{ env.SOLUTION_PATH }} \
      #       --no-build \
      #       --configuration Release

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: build-output-${{ needs.validate.outputs.version }}
          path: |
            **/bin/Release/**
          retention-days: 1

  # ---------------------------------------------------------------------------
  # JOB 4 - Pack: produce .nupkg + .snupkg and verify contents
  # ---------------------------------------------------------------------------
  pack:
    name: Pack
    runs-on: ubuntu-latest
    needs: [validate, build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output-${{ needs.validate.outputs.version }}

      - name: Restore
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Pack
        run: |
          dotnet pack ${{ env.PROJECT_PATH }} \
            --no-build \
            --configuration Release \
            /p:Version=${{ needs.validate.outputs.version }} \
            /p:ContinuousIntegrationBuild=true \
            --include-symbols \
            --output ${{ env.OUTPUT_DIR }}

      - name: Verify package contents
        run: |
          echo "Artifacts:"
          ls -lh ${{ env.OUTPUT_DIR }}

          NUPKG=$(ls ${{ env.OUTPUT_DIR }}/*.nupkg 2>/dev/null | head -1)
          if [[ -z "$NUPKG" ]]; then
            echo "::error::No .nupkg file produced."
            exit 1
          fi
          echo "nupkg verified: $NUPKG"

          SNUPKG=$(ls ${{ env.OUTPUT_DIR }}/*.snupkg 2>/dev/null | head -1)
          if [[ -n "$SNUPKG" ]]; then
            echo "snupkg present: $SNUPKG"
          else
            echo "Warning: no .snupkg found - symbols will not be uploaded."
          fi

      - name: Upload packages artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ needs.validate.outputs.version }}
          path: |
            ${{ env.OUTPUT_DIR }}/*.nupkg
            ${{ env.OUTPUT_DIR }}/*.snupkg
          retention-days: 30

  # ---------------------------------------------------------------------------
  # JOB 5 - Publish: push to NuGet.org + create GitHub Release
  #          Requires manual approval via the "nuget-release" environment.
  #          Skipped entirely when dry_run = true.
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: [validate, pack]
    if: ${{ needs.validate.outputs.dry_run != 'true' }}

    environment: nuget-release

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages-${{ needs.validate.outputs.version }}
          path: ${{ env.OUTPUT_DIR }}

      - name: Verify NUGET_API_KEY is configured
        run: |
          if [[ -z "${{ secrets.NUGET_API_KEY }}" ]]; then
            echo "::error::NUGET_API_KEY secret is missing."
            echo "::error::Go to Settings -> Secrets -> Actions and add NUGET_API_KEY."
            exit 1
          fi
          echo "NUGET_API_KEY is set."

      - name: Push .nupkg to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push "${{ env.OUTPUT_DIR }}/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Push .snupkg symbols to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        continue-on-error: true
        run: |
          dotnet nuget push "${{ env.OUTPUT_DIR }}/*.snupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Extract changelog entry
        id: changelog
        run: |
          NOTES=$(awk "/^## \[${{ needs.validate.outputs.version }}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md 2>/dev/null || true)
          if [[ -z "$NOTES" ]]; then
            NOTES="See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for release notes."
          fi
          printf '%s' "$NOTES" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || format('v{0}', needs.validate.outputs.version) }}
          body: ${{ steps.changelog.outputs.NOTES }}
          prerelease: ${{ needs.validate.outputs.prerelease == 'true' }}
          files: |
            ${{ env.OUTPUT_DIR }}/*.nupkg
            ${{ env.OUTPUT_DIR }}/*.snupkg

      - name: Verify package on NuGet.org
        if: ${{ needs.validate.outputs.prerelease == 'false' }}
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.nuget.org/v3-flatcontainer/autoapi/$VERSION/autoapi.$VERSION.nupkg")
          if [[ "$STATUS" == "200" ]]; then
            echo "Package AutoApi $VERSION is live on NuGet.org"
          else
            echo "Warning: package not yet indexed (HTTP $STATUS). NuGet may take a few minutes."
          fi
