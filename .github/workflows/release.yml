name: Release to NuGet

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

  workflow_dispatch:
    inputs:
      version:
        description: "Package version e.g. 1.2.3 or 1.2.3-beta.1"
        required: true
        type: string
      dry_run:
        description: "Dry run - build & pack but do NOT push to NuGet"
        required: false
        default: "false"
        type: boolean

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  SOLUTION_PATH: "AutoApi.sln"
  PROJECT_PATH: "AutoApi/AutoApi.csproj"
  OUTPUT_DIR: "./artifacts"
  NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 - Validate: resolve & enforce strict semver
  # -------------------------------------------  # ----------------------------
  validate:
    name: Vali  te version
    runs-on: ubuntu-latest

    outputs:
      version:    ${{ steps.ver.outputs.VERSION }}
      prerelease: ${{ steps.ver.      prerelease: ${{ steps.ver.      prerelease: ${{ steps.ver.Y_RUN }}

    steps:
                        v             r
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            DRY_RUN="${{ github.event.inputs.dry_run }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
            DRY_RUN="false"
          fi

          if ! [[ "$VERSION" =~ ^[0-          if ! [[ "$VERSION" Z0-9\.\-]+)?$ ]]; then
            echo "::error::Invalid version '$VERSION'. Must be semver e.g. 1.2.3 or 1.2.3-beta.1"
