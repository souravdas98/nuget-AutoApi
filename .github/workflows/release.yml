on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"       # stable      в†’ v1.2.3
      - "v[0-9]+.[0-9]+.[0-9]+-*"     # pre-release в†’ v1.2.3-beta.1

  workflow_dispatch:
    inputs:
      version:
        description: "Package version e.g. 1.2.3 or 1.2.3-beta.1"
        required: true
        type: string
      dry_run:
        description: "Dry run вЂ” build & pack but do NOT push to NuGet"
        required: false
        default: "false"
        type: boolean

# в”Ђв”Ђ Never cancel an in-flight release в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
