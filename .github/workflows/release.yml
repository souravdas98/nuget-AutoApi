  # ---------------------------------------------------------------------------
  pack:
    name: Pack
    runs-on: ubuntu-latest
    needs: [validate, build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output-${{ needs.validate.outputs.version }}

      - name: Pack
        run: |
          dotnet pack ${{ env.PROJECT_PATH }} \
            --no-build \
            --configuration Release \
            /p:Version=${{ needs.validate.outputs.version }} \
            /p:ContinuousIntegrationBuild=true \
            --include-symbols \
            --output ${{ env.OUTPUT_DIR }}

      - name: Verify package contents
        run: |
          echo "Artifacts:"
          ls -lh ${{ env.OUTPUT_DIR }}

          NUPKG=$(ls ${{ env.OUTPUT_DIR }}/*.nupkg 2>/dev/null | head -1)
          if [[ -z "$NUPKG" ]]; then
            echo "::error::No .nupkg file produced."
            exit 1
          fi
          echo "nupkg verified: $NUPKG"

          SNUPKG=$(ls ${{ env.OUTPUT_DIR }}/*.snupkg 2>/dev/null | head -1)
          if [[ -n "$SNUPKG" ]]; then
            echo "snupkg present: $SNUPKG"
          else
            echo "Warning: no .snupkg found - symbols will not be uploaded."
          fi

      - name: Upload packages artifact
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ needs.validate.outputs.version }}
          path: |
            ${{ env.OUTPUT_DIR }}/*.nupkg
            ${{ env.OUTPUT_DIR }}/*.snupkg
          retention-days: 30

  # ---------------------------------------------------------------------------
  # JOB 5 - Publish: push to NuGet.org + create GitHub Release
  #          Requires manual approval via the "nuget-release" environment.
  #          Skipped entirely when dry_run = true.
  # ---------------------------------------------------------------------------
  publish:
    name: Publish to NuGet
    runs-on: ubuntu-latest
    needs: [validate, pack]
    if: ${{ needs.validate.outputs.dry_run != 'true' }}

    environment: nuget-release

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages-${{ needs.validate.outputs.version }}
          path: ${{ env.OUTPUT_DIR }}

      - name: Verify NUGET_API_KEY is configured
        run: |
          if [[ -z "${{ secrets.NUGET_API_KEY }}" ]]; then
            echo "::error::NUGET_API_KEY secret is missing."
            echo "::error::Go to Settings -> Secrets -> Actions and add NUGET_API_KEY."
            exit 1
          fi
          echo "NUGET_API_KEY is set."

      - name: Push .nupkg to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push "${{ env.OUTPUT_DIR }}/*.nupkg" \
            --api-key "$NUGET_API_KEY" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Push .snupkg symbols to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        continue-on-error: true
